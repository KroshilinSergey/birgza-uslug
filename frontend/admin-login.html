<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .error { color: red; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Login</h2>
        <input type="text" id="phone" placeholder="Phone" value="+79001772718">
        <input type="password" id="password" placeholder="Password" value="Oukitelk6000pro">
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
    </div>
    <script>
        async function login() {
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;
            
            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                
                if (data.success && data.user.role === "admin") {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    window.location.href = "admin-panel.html";
                } else {
                    document.getElementById("error").innerHTML = "Access denied";
                }
            } catch(e) {
                document.getElementById("error").innerHTML = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
